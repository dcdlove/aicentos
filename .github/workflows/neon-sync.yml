name: Sync main → back

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 同步 main → back
        env:
          MAIN_DB_URL: ${{ secrets.MAIN_DB_URL }}
          BACK_DB_URL: ${{ secrets.BACK_DB_URL }}
        run: |
          set -euo pipefail

          echo "=== 导出 main (PG18) ==="
          docker run --rm \
            -v /tmp:/backup \
            -e "DB_URL=${MAIN_DB_URL}" \
            postgres:18-bookworm \
            sh -c 'pg_dump -Fc -v --no-owner --no-privileges -d "$DB_URL" -f /backup/sync.dump'

          echo "=== 开始同步到备份库 ==="
          FAILED=0
          INDEX=0

          # 支持多个 URL（用逗号分隔）
          echo "$BACK_DB_URL" | tr ',' '\n' | while read -r url; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue

            INDEX=$((INDEX + 1))
            echo "--- 同步到备份库 #${INDEX} ---"

            if docker run --rm \
              -v /tmp:/backup \
              -e "DB_URL=${url}" \
              postgres:18-bookworm \
              sh -c 'pg_restore -v \
                --clean --if-exists \
                --no-owner --no-privileges \
                --disable-triggers \
                -d "$DB_URL" /backup/sync.dump' \
              2>&1 | tee /tmp/restore_${INDEX}.log
            then
              echo "备份库 #${INDEX} 同步成功"
            else
              echo "::warning::备份库 #${INDEX} 同步失败（查看日志 /tmp/restore_${INDEX}.log）"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED} 个备份库同步失败"
            exit 1
          fi

          echo "=== 全部同步完成 ==="
