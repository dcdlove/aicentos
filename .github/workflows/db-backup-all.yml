name: DB Backup (All Databases)

on:
  schedule:
    # 每天 UTC 4:00 (北京时间 12:00) 执行
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: db-backup-all
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MASTER_DSN: ${{ secrets.MASTER_DSN }}
      SLAVE_DSNS: ${{ secrets.SLAVE_DSNS }}
      BACKUP_REPO: fishxcode/new-api
      BACKUP_BRANCH: main
      BACKUP_DIR: pg
    steps:
      - name: Install PostgreSQL 18 client
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates git-lfs jq
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"

      - name: Build database list
        shell: bash
        run: |
          set -euo pipefail

          DB_LIST_FILE="/tmp/db-list.txt"
          : > "$DB_LIST_FILE"

          if [ -n "${MASTER_DSN:-}" ]; then
            echo "master|${MASTER_DSN}" >> "$DB_LIST_FILE"
          fi

          if [ -n "${SLAVE_DSNS:-}" ]; then
            while IFS='|' read -r DB_NAME DB_DSN; do
              DB_NAME="$(echo "${DB_NAME:-}" | xargs)"
              DB_DSN="$(echo "${DB_DSN:-}" | xargs)"
              [ -z "$DB_NAME" ] && continue
              [[ "$DB_NAME" == \#* ]] && continue
              [ -z "$DB_DSN" ] && continue
              echo "${DB_NAME}|${DB_DSN}" >> "$DB_LIST_FILE"
            done <<< "$SLAVE_DSNS"
          fi

          VALID_COUNT=$(grep -cE '^[a-zA-Z0-9_-]+\|postgres(ql)?://' "$DB_LIST_FILE" || true)
          echo "Found ${VALID_COUNT} database(s) to back up"

          if [ "$VALID_COUNT" -eq 0 ]; then
            echo "::error::No valid database DSNs found. Please set MASTER_DSN and/or SLAVE_DSNS."
            exit 1
          fi

          {
            echo "DB_LIST_FILE=$DB_LIST_FILE"
            echo "DB_COUNT=$VALID_COUNT"
          } >> "$GITHUB_ENV"

      - name: Clone backup repo
        env:
          GH_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          set -euo pipefail
          gh repo clone "$BACKUP_REPO" /tmp/backup-repo -- --depth 1 --single-branch --branch "$BACKUP_BRANCH"
          cd /tmp/backup-repo
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${BACKUP_REPO}.git"
          git lfs install
          grep -q '^pg/\*\* filter=lfs' .gitattributes 2>/dev/null || printf "pg/** filter=lfs diff=lfs merge=lfs -text\n" >> .gitattributes
          git add .gitattributes
          mkdir -p "$BACKUP_DIR"

      - name: Dump and commit all databases
        shell: bash
        run: |
          set -euo pipefail

          REPORT=""
          FAILED=0
          SUCCESS=0
          TIMESTAMP="$(date -u '+%Y-%m-%d_%H%M%S')"

          cd /tmp/backup-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          while IFS='|' read -r DB_NAME DB_DSN; do
            [ -z "${DB_NAME:-}" ] && continue
            DUMP_FILE="/tmp/${DB_NAME}_${TIMESTAMP}.dump"
            TARGET_DIR="${BACKUP_DIR}/${DB_NAME}"
            TARGET_FILE="${TARGET_DIR}/${TIMESTAMP}.dump"

            echo "::group::pg_dump → ${DB_NAME}"
            START=$(date +%s)
            if pg_dump -v -d "$DB_DSN" -F c --compress=9 -f "$DUMP_FILE"; then
              END=$(date +%s)
              ELAPSED=$((END-START))
              mkdir -p "$TARGET_DIR"
              mv "$DUMP_FILE" "$TARGET_FILE"
              SIZE=$(du -h "$TARGET_FILE" | cut -f1)
              git add "$TARGET_FILE"
              REPORT="${REPORT}${DB_NAME}|OK|${SIZE}|${ELAPSED}s"$'\n'
              SUCCESS=$((SUCCESS+1))
              echo "${DB_NAME}: backup completed (${SIZE}, ${ELAPSED}s)"
            else
              END=$(date +%s)
              ELAPSED=$((END-START))
              rm -f "$DUMP_FILE"
              REPORT="${REPORT}${DB_NAME}|FAIL|?|${ELAPSED}s"$'\n'
              FAILED=$((FAILED+1))
              echo "::error::${DB_NAME}: backup failed after ${ELAPSED}s"
            fi
            echo "::endgroup::"
          done < "$DB_LIST_FILE"

          if git diff --cached --quiet; then
            echo "No backup files changed"
          else
            git commit -m "backup: all databases ${TIMESTAMP}"
            git push origin "$BACKUP_BRANCH" || {
              git pull --rebase origin "$BACKUP_BRANCH"
              git push origin "$BACKUP_BRANCH"
            }
          fi

          {
            echo "BACKUP_REPORT<<REPORT_EOF"
            echo "$REPORT"
            echo "REPORT_EOF"
          } >> "$GITHUB_ENV"

          echo "Backup summary: ${SUCCESS} success, ${FAILED} failed"
          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: rm -f /tmp/*.dump /tmp/db-list.txt && rm -rf /tmp/backup-repo
